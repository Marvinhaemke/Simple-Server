<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Your Workflow - Variant A</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            padding: 4rem 2rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 3rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .cta-button {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 1.25rem 3rem;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            cursor: pointer;
            border: none;
        }
        .cta-button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }
    </style>
    
    {% if pixel_id %}
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '{{ pixel_id }}');
    fbq('track', 'PageView');
    </script>
    {% endif %}
    
    <script>
        function sendServerEvent(eventName, callback) {
            let fbp = document.cookie.split('; ').find(row => row.startsWith('_fbp='))?.split('=')[1] || null;
            let fbc = document.cookie.split('; ').find(row => row.startsWith('_fbc='))?.split('=')[1] || null;
            
            fetch('/api/record_event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_name: eventName, fbp: fbp, fbc: fbc })
            }).then(() => {
                if (callback) callback();
            }).catch(() => {
                if (callback) callback(); // Proceed even if tracking fails visually
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Record Page View
            sendServerEvent('visitedLandingPage');

            // CTA Click handling
            const ctaBtn = document.getElementById('cta-btn');
            if (ctaBtn) {
                ctaBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Optional: Fire FBQ standard event if client-side is desired alongside CAPI
                    if (typeof fbq !== 'undefined') fbq('track', 'AddToCart'); 
                    
                    sendServerEvent('clickedctabutton', () => {
                        window.location.href = '/thank-you';
                    });
                });
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <h1>Unlock Your True Potential (Variant A)</h1>
        <p class="subtitle">Watch this short video to learn the exact framework used by top performers.</p>
        
        <div class="video-container">
            <!-- Placeholder Video -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <button id="cta-btn" class="cta-button">Yes, I Want Access Now!</button>
    </div>
</body>
</html>
