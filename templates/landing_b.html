<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Your Workflow - Variant B</title>
    <style>
        :root {
            --primary: #9333ea;
            /* Purple for Variant B */
            --primary-hover: #7e22ce;
            --bg: #1e1b4b;
            /* Indigo background */
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            padding: 4rem 2rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3.25rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #c084fc, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            /* Bolder font for Variant B */
        }

        p.subtitle {
            font-size: 1.35rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 */
            height: 0;
            border-radius: 16px;
            /* slightly rounder */
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(147, 51, 234, 0.25);
            margin-bottom: 3.5rem;
            border: 2px solid rgba(192, 132, 252, 0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 1.5rem 3.5rem;
            /* Larger button */
            font-size: 1.35rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            border-radius: 8px;
            /* Square edges for contrast */
            transition: all 0.2s ease-in-out;
            box-shadow: 0 10px 20px rgba(147, 51, 234, 0.4);
            cursor: pointer;
            border: none;
        }

        .cta-button:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
            /* Different hover effect */
            box-shadow: 0 15px 30px rgba(147, 51, 234, 0.6);
        }
    </style>

    {% if pixel_id %}
    <!-- Meta Pixel Code -->
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '{{ pixel_id }}');
        fbq('track', 'PageView');
    </script>
    {% endif %}

    <script>
        function sendServerEvent(eventName, callback) {
            let fbp = document.cookie.split('; ').find(row => row.startsWith('_fbp='))?.split('=')[1] || null;
            let fbc = document.cookie.split('; ').find(row => row.startsWith('_fbc='))?.split('=')[1] || null;

            fetch('/api/record_event', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_name: eventName, fbp: fbp, fbc: fbc })
            }).then(() => {
                if (callback) callback();
            }).catch(() => {
                if (callback) callback();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            sendServerEvent('visitedLandingPage');

            const ctaBtn = document.getElementById('cta-btn');
            if (ctaBtn) {
                ctaBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (typeof fbq !== 'undefined') fbq('track', 'AddToCart');

                    sendServerEvent('clickedctabutton', () => {
                        window.location.href = '/thank-you';
                    });
                });
            }
        });
    </script>
</head>

<body>
    <div class="container">
        <h1>Discover The Secret Formula (Variant B)</h1>
        <p class="subtitle">Join thousands of others who have revolutionized their process using this simple method.</p>

        <div class="video-container">
            <!-- Placeholder Video -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
        </div>

        <button id="cta-btn" class="cta-button">Reveal The Secret Instantly</button>
    </div>
</body>

</html>
